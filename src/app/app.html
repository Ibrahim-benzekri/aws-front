<div class="container">
  <h1>Gestion des tâches</h1>

  <div class="form">
    <input type="text" [(ngModel)]="newTaskTitle" placeholder="Nouvelle tâche" (keyup.enter)="addTask()" />
    <button type="button" (click)="addTask()">Ajouter</button>
  </div>

  <p *ngIf="loading">Chargement...</p>
  <p *ngIf="error" class="error">{{ error }}</p>

  <ul *ngIf="!loading && tasks.length > 0">
    <li *ngFor="let task of tasks">
      {{ task.id }} - {{ task.title }}
    </li>
  </ul>

  <p *ngIf="!loading && tasks.length === 0">
    Aucune tâche pour le moment.
  </p>
</div>
